<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理 - 同学城市分布</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f6fa;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }
        
        .header h1 {
            color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            font-size: 0.9em;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        
        th {
            background: #f8f9fa;
            color: #667eea;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .actions {
            display: flex;
            gap: 5px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        
        .stat-label {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 数据管理后台</h1>
            <div class="btn-group">
                <button class="btn btn-success" onclick="exportData()">📥 导出Excel</button>
                <button class="btn btn-primary" onclick="window.location.href='/'">🗺️ 查看地图</button>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalCount">0</span>
                <div class="stat-label">总人数</div>
            </div>
        </div>
        
        <table id="dataTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>姓名</th>
                    <th>城市</th>
                    <th>微信</th>
                    <th>职业</th>
                    <th>备注</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <h3>暂无数据</h3>
            <p>点击"查看地图"返回主页面添加同学信息</p>
        </div>
    </div>
    
    <script>
        let classmatesData = [];
        
        async function loadData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                classmatesData = data.classmates;
                
                // 更新统计
                document.getElementById('totalCount').textContent = data.totalCount;
                
                // 更新表格
                const tbody = document.getElementById('tableBody');
                
                if (classmatesData.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    document.getElementById('dataTable').style.display = 'none';
                    return;
                }
                
                const html = classmatesData.map((c, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${c.姓名}</td>
                        <td>📍 ${c.城市}</td>
                        <td>${c.微信 || '-'}</td>
                        <td>${c.职业 || '-'}</td>
                        <td>${c.备注 || '-'}</td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-danger" onclick="deleteClassmate(${index})">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
                
                tbody.innerHTML = html;
                
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败');
            }
        }
        
        async function deleteClassmate(index) {
            if (!confirm('确定要删除这条记录吗？')) {
                return;
            }
            
            // 这里需要后端支持删除功能
            alert('删除功能需要后端支持，当前版本请直接编辑 Excel 文件');
        }
        
        function exportData() {
            window.location.href = '/api/export';
        }
        
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
